name: Update README with Blog Posts
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://gowthampuli.blogspot.com/feeds/posts/default"
          max_post_count: 5
          template: "[$title]($url) — $date"
          readme_path: README.md
          commit_message: "chore: update latest blog posts"
